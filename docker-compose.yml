services:
  mysql:
    image: mysql:8.0
    container_name: web_computer_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: web_computer
      MYSQL_USER: web_computer
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - web_computer_net

  redis:
    image: redis:alpine
    container_name: web_computer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - web_computer_net

volumes:
  mysql_data:
  redis_data:

networks:
  web_computer_net:
    driver: bridge
